<!DOCTYPE html>
<html>
<head>
    <title>Giachuothub Key System</title>
    <style>
        body { 
            background: url('https://i.ibb.co/hLqJ97Hk/dwmm-H87p.jpg') center/cover no-repeat; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            background: rgba(26, 26, 26, 0.85); 
            padding: 25px; 
            border-radius: 15px; 
            color: white; 
            text-align: center; 
            border: 1px solid #444;
        }
        h3 { margin-top: 0; }
        button { 
            background: #6366f1; 
            border: none; 
            padding: 10px 20px; 
            color: white; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🔑 Giachuothub Key System</h3>
        <div id="key-display">❌ NO KEY</div>
        <br><br>
        <button onclick="generateKey()">Copy Key</button>
    </div>
    <script>
        async function generateKey() {
            try {
                const res = await fetch('/api/generate-key');
                const data = await res.json();
                document.getElementById('key-display').innerText = data.key;
                // Tự động copy vào clipboard
                navigator.clipboard.writeText(data.key);
                alert("Đã copy key: " + data.key);
            } catch (e) {
                alert("Lỗi khi tạo key!");
            }
        }
    </script>
</body>
</html>
