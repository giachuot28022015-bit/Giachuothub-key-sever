<!DOCTYPE html>
<html>
<head>
    <title>Giachuothub Key System</title>
    <style>
        body { background: url('https://cdn.phototourl.com/free/2026-06-20-fa725e6a-9afd-46e4-aaf4-b92749dc8e00.jpg') center/cover; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .box { background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px; text-align: center; }
        button { background: #6366f1; border: none; padding: 15px 30px; color: white; border-radius: 10px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🔑 Giachuothub Key System</h3>
        <h2 id="key-display">❌ NO KEY</h2>
        <button onclick="generateKey()">Copy Key</button>
    </div>
    <script>
        async function generateKey() {
            const res = await fetch('/api/generate-key');
            const data = await res.json();
            document.getElementById('key-display').innerText = data.key;
            navigator.clipboard.writeText(data.key);
            alert("Đã copy: " + data.key);
        }
    </script>
</body>
</html>
